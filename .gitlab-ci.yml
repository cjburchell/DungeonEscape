variables:
  OBJECTS_DIRECTORY: "obj"
  NUGET_PACKAGES_DIRECTORY: ".nuget"
  SOURCE_CODE_PATH: "*/*/"
  RESHARPER_SOLUTION_NAME: "DungeonEscape.sln"
  RESHARPER_EXCLUDE: ""
  RESHARPER_THRESHOLD: 0
  RESHARPER_TOOL_VERSION: "2026.1.0.1"
  DOTNET_SDK_IMAGE: "mcr.microsoft.com/dotnet/sdk:10.0"
  UNITY_PROJECT_PATH: "DungeonEscape.Unity"
  UNITY_CI_IMAGE: "unityci/editor:ubuntu-6000.4.4f1-base-3.2.2"
  UNITY_WINDOWS_BUILD_IMAGE: "unityci/editor:ubuntu-6000.4.4f1-windows-mono-3.2.2"
  UNITY_EXECUTABLE: "unity-editor"
  UNITY_CI_ENABLED: "true"
  UNITY_BUILD_WINDOWS_ENABLED: "true"
  UNITY_LICENSE_B64: ""

stages:
  - restore
  - build
  - scan
  - test
  - package

.unity-license-before-script: &unity-license-before-script
  - mkdir -p /root/.local/share/unity3d/Unity
  - |
    echo "Unity CI variable presence: UNITY_LICENSE_B64=$([ -n "$UNITY_LICENSE_B64" ] && echo set || echo unset), UNITY_LICENSE=$([ -n "$UNITY_LICENSE" ] && echo set || echo unset), UNITY_SERIAL=$([ -n "$UNITY_SERIAL" ] && echo set || echo unset), UNITY_EMAIL=$([ -n "$UNITY_EMAIL" ] && echo set || echo unset), UNITY_PASSWORD=$([ -n "$UNITY_PASSWORD" ] && echo set || echo unset), UNITY_LICENSING_SERVER=$([ -n "$UNITY_LICENSING_SERVER" ] && echo set || echo unset)"
    if [ -n "$UNITY_LICENSE_B64" ]; then
      if [ -f "$UNITY_LICENSE_B64" ]; then
        tr -d '\r\n\t ' < "$UNITY_LICENSE_B64" | base64 -d > /root/.local/share/unity3d/Unity/Unity_lic.ulf
      else
        printf '%s' "$UNITY_LICENSE_B64" | tr -d '\r\n\t ' | base64 -d > /root/.local/share/unity3d/Unity/Unity_lic.ulf
      fi
      echo "Unity license file written from UNITY_LICENSE_B64."
    elif [ -n "$UNITY_LICENSE" ]; then
      if [ -f "$UNITY_LICENSE" ]; then
        tr -d '\r' < "$UNITY_LICENSE" > /root/.local/share/unity3d/Unity/Unity_lic.ulf
      else
        echo "$UNITY_LICENSE" | tr -d '\r' > /root/.local/share/unity3d/Unity/Unity_lic.ulf
      fi
      echo "Unity license file written from UNITY_LICENSE."
    elif [ -n "$UNITY_SERIAL" ] && [ -n "$UNITY_EMAIL" ] && [ -n "$UNITY_PASSWORD" ]; then
      "$UNITY_EXECUTABLE" \
        -batchmode \
        -nographics \
        -quit \
        -logFile /dev/stdout \
        -username "$UNITY_EMAIL" \
        -password "$UNITY_PASSWORD" \
        -serial "$UNITY_SERIAL"
    elif [ -n "$UNITY_LICENSING_SERVER" ]; then
      echo "UNITY_LICENSING_SERVER is configured; Unity will attempt license server activation."
    else
      echo "No Unity license variables configured. Set UNITY_LICENSE_B64, UNITY_LICENSE, or UNITY_SERIAL, UNITY_EMAIL, and UNITY_PASSWORD in GitLab CI/CD variables."
    fi

.unity-license-after-script: &unity-license-after-script
  - |
    if [ -n "$UNITY_SERIAL" ] && [ -n "$UNITY_EMAIL" ] && [ -n "$UNITY_PASSWORD" ] && [ -z "$UNITY_LICENSE" ] && [ -z "$UNITY_LICENSE_B64" ]; then
      "$UNITY_EXECUTABLE" \
        -batchmode \
        -nographics \
        -quit \
        -logFile /dev/stdout \
        -username "$UNITY_EMAIL" \
        -password "$UNITY_PASSWORD" \
        -returnlicense || true
    fi

cache:
  key: "$CI_JOB_STAGE-$CI_COMMIT_REF_SLUG"
  paths:
    - "$SOURCE_CODE_PATH$OBJECTS_DIRECTORY/project.assets.json"
    - "$SOURCE_CODE_PATH$OBJECTS_DIRECTORY/*.csproj.nuget.*"
    - "$NUGET_PACKAGES_DIRECTORY"
  policy: pull-push

dotnet-restore:
  image: $DOTNET_SDK_IMAGE
  stage: restore
  script:
    - dotnet restore DungeonEscape.sln --packages "$NUGET_PACKAGES_DIRECTORY"

dotnet-build:
  image: $DOTNET_SDK_IMAGE
  stage: build
  needs:
    - dotnet-restore
  script:
    - dotnet restore DungeonEscape.sln --packages "$NUGET_PACKAGES_DIRECTORY"
    - dotnet build DungeonEscape.sln --no-restore
  artifacts:
    expire_in: 1 week
    paths:
      - DungeonEscape.Unity/Assets/DungeonEscape/Plugins/DungeonEscape.Core.dll
      - DungeonEscape.Unity/Assets/DungeonEscape/Plugins/DungeonEscape.Core.pdb

dotnet-tests:
  image: $DOTNET_SDK_IMAGE
  stage: test
  needs:
    - dotnet-build
  script:
    - dotnet restore DungeonEscape.sln --packages "$NUGET_PACKAGES_DIRECTORY"
    - dotnet test DungeonEscape.sln --no-restore

unity-validate:
  image: $UNITY_CI_IMAGE
  stage: test
  needs:
    - job: dotnet-build
      artifacts: true
  variables:
    UNITY_LOG_FILE: "$CI_PROJECT_DIR/DungeonEscape.Unity/Logs/ci-unity-validate.log"
  before_script: *unity-license-before-script
  script:
    - mkdir -p "$CI_PROJECT_DIR/DungeonEscape.Unity/Logs"
    - >
      "$UNITY_EXECUTABLE"
      -batchmode
      -nographics
      -quit
      -projectPath "$CI_PROJECT_DIR/$UNITY_PROJECT_PATH"
      -executeMethod Redpoint.DungeonEscape.UnityEditor.UnityCiValidation.ValidateProject
      -logFile "$UNITY_LOG_FILE"
  after_script: *unity-license-after-script
  artifacts:
    when: always
    paths:
      - DungeonEscape.Unity/Logs/ci-unity-validate.log
  rules:
    - if: '$UNITY_CI_ENABLED == "false"'
      when: never
    - when: on_success

unity-build-windows:
  image: $UNITY_WINDOWS_BUILD_IMAGE
  stage: package
  needs:
    - job: dotnet-build
      artifacts: true
    - dotnet-tests
  variables:
    UNITY_LOG_FILE: "$CI_PROJECT_DIR/DungeonEscape.Unity/Logs/ci-unity-build-windows.log"
    UNITY_WINDOWS_BUILD_PATH: "DungeonEscape.Unity/Builds/Windows"
  before_script: *unity-license-before-script
  script:
    - mkdir -p "$CI_PROJECT_DIR/DungeonEscape.Unity/Logs"
    - rm -rf "$CI_PROJECT_DIR/$UNITY_WINDOWS_BUILD_PATH"
    - >
      "$UNITY_EXECUTABLE"
      -batchmode
      -nographics
      -quit
      -projectPath "$CI_PROJECT_DIR/$UNITY_PROJECT_PATH"
      -executeMethod Redpoint.DungeonEscape.UnityEditor.UnityCiBuild.BuildWindows64
      -logFile "$UNITY_LOG_FILE"
  after_script: *unity-license-after-script
  artifacts:
    when: on_success
    expire_in: 1 week
    name: "DungeonEscape-Windows-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    paths:
      - DungeonEscape.Unity/Builds/Windows/
      - DungeonEscape.Unity/Logs/ci-unity-build-windows.log
  rules:
    - if: '$UNITY_BUILD_WINDOWS_ENABLED == "false"'
      when: never
    - when: on_success

resharper-scan:
  image: $DOTNET_SDK_IMAGE
  stage: scan
  needs:
    - dotnet-build
  script:
    - dotnet tool install --global JetBrains.ReSharper.GlobalTools --version "$RESHARPER_TOOL_VERSION"
    - export PATH="$PATH:/root/.dotnet/tools"
    - jb inspectcode --exclude="$RESHARPER_EXCLUDE" -o=RsInspection.xml -f=xml --caches-home=temp "$RESHARPER_SOLUTION_NAME" --dotnetcore=/usr/share/dotnet/dotnet
    - |
      ISSUE_COUNT=$(grep -o '<Issue ' RsInspection.xml | wc -l | tr -d ' ')
      echo "ReSharper issue count: $ISSUE_COUNT"
      if [ "$ISSUE_COUNT" -gt "$RESHARPER_THRESHOLD" ]; then
        echo "ReSharper issue count $ISSUE_COUNT exceeds threshold $RESHARPER_THRESHOLD"
        exit 1
      fi
  artifacts:
    when: always
    paths:
      - RsInspection.xml